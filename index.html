<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>MBP Tracker - Max</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050508; color: #d0d0e0; font-family: system-ui, -apple-system, sans-serif; touch-action: manipulation; }
        .card { background-color: #0d0d1a; border: 1px solid #1e1e35; border-radius: 1rem; padding: 1.25rem; margin-bottom: 1rem; }
        input { background: #16162a; border: 1px solid #333; color: white; border-radius: 0.5rem; padding: 0.5rem; }
        button:active { transform: scale(0.98); }
    </style>
</head>
<body class="p-4 max-w-md mx-auto">
    <h1 class="text-xl font-bold text-center mb-6 text-indigo-400">מעקב מב״פ — מקס</h1>

    <div class="grid grid-cols-3 gap-2 mb-6 text-center">
        <div class="card p-2! pt-4!">
            <div class="text-[--protein] text-xs mb-1" style="--protein:#e8634a">חלבון</div>
            <div id="p-val" class="text-lg font-bold">0 / 4.5</div>
        </div>
        <div class="card p-2! pt-4!">
            <div class="text-[--carbs] text-xs mb-1" style="--carbs:#d4a438">פחמימה</div>
            <div id="c-val" class="text-lg font-bold">0 / 6.5</div>
        </div>
        <div class="card p-2! pt-4!">
            <div class="text-[--fat] text-xs mb-1" style="--fat:#5ab8a8">שומן</div>
            <div id="f-val" class="text-lg font-bold">0 / 2.0</div>
        </div>
    </div>

    <div class="space-y-3 mb-6">
        <button onclick="add('protein', 1.14)" class="w-full bg-[#e8634a]/20 border border-[#e8634a]/40 p-4 rounded-xl text-right flex justify-between items-center">
            <span>חזה עוף (148 גרם)</span>
            <span class="font-bold text-[#e8634a]">1.14-</span>
        </button>
        <button onclick="add('carbs', 1.46)" class="w-full bg-[#d4a438]/20 border border-[#d4a438]/40 p-4 rounded-xl text-right flex justify-between items-center text-[#d4a438]">
            <span>תפוח אדמה (263 גרם)</span>
            <span class="font-bold">1.46-</span>
        </button>
        <button onclick="add('carbs', 0.83)" class="w-full bg-[#d4a438]/10 border border-[#d4a438]/30 p-4 rounded-xl text-right flex justify-between items-center text-[#d4a438]">
            <span>בטטה (145 גרם)</span>
            <span class="font-bold">0.83-</span>
        </button>
    </div>

    <div class="card">
        <div class="text-sm mb-3 font-semibold text-indigo-300 text-center">הזנה ידנית (גרם)</div>
        <div class="grid grid-cols-2 gap-2">
            <input type="number" id="manual-weight" placeholder="כמות בגרם" class="w-full text-center">
            <select id="macro-type" class="bg-[#16162a] border border-[#333] rounded-lg px-2">
                <option value="protein">חלבון</option>
                <option value="carbs">פחמימה</option>
            </select>
        </div>
        <button onclick="addManual()" class="w-full mt-3 bg-indigo-600 p-2 rounded-lg font-bold">הוסף למאזן</button>
    </div>

    <div class="card flex justify-between items-center">
        <div>
            <div class="text-xs text-blue-400">מים</div>
            <div class="font-bold"><span id="w-val">0</span>L / 4L</div>
        </div>
        <button onclick="add('water', 0.5)" class="bg-blue-600 px-4 py-2 rounded-lg font-bold text-sm">+ 0.5L</button>
    </div>

    <button onclick="resetDay()" class="mt-4 text-slate-600 text-[10px] w-full uppercase tracking-widest hover:text-red-500 transition-colors">נקה יום</button>

    <script>
        let data = JSON.parse(localStorage.getItem('mbpData')) || { protein: 0, carbs: 0, fat: 0, water: 0 };

        function updateUI() {
            document.getElementById('p-val').innerText = `${data.protein.toFixed(2)} / 4.5`;
            document.getElementById('c-val').innerText = `${data.carbs.toFixed(2)} / 6.5`;
            document.getElementById('f-val').innerText = `${data.fat.toFixed(2)} / 2.0`;
            document.getElementById('w-val').innerText = data.water.toFixed(1);
            localStorage.setItem('mbpData', JSON.stringify(data));
        }

        function add(type, amount) {
            data[type] = Math.round((data[type] + amount) * 100) / 100;
            updateUI();
        }

        function addManual() {
            const weight = parseFloat(document.getElementById('manual-weight').value);
            const type = document.getElementById('macro-type').value;
            if (!weight) return;
            
            let amount = 0;
            if (type === 'protein') amount = weight / 130;
            if (type === 'carbs') amount = weight / 180; // לפי מנת תפוח אדמה ממוצעת
            
            add(type, amount);
            document.getElementById('manual-weight').value = ''; // ניקוי השדה בלי לרענן
        }

        function resetDay() {
            if(confirm('לאפס נתונים?')) {
                data = { protein: 0, carbs: 0, fat: 0, water: 0 };
                updateUI();
            }
        }

        updateUI();
    </script>
</body>
</html>
